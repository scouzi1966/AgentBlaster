name: qwen-gemma-stress
description: Starter Qwen/Gemma agentic stress matrix for AFM and LM Studio across tool loops, fan-out, prefill, harness engineering, and trace replay at low/high concurrency.
runs:
- engine: afm
  model: mlx-community/Qwen3.6-27B
  suite: agentic-tool-loop
  concurrency: 1
  raw_traces: redacted
  no_raw_traces: true
  strict_unknown_capabilities: true
  model_metadata:
    architecture: qwen3.6-dense
    quantization: unknown
    context_length: 262144
- engine: afm
  model: mlx-community/Qwen3.6-27B
  suite: agentic-tool-loop
  concurrency: 4
  raw_traces: redacted
  no_raw_traces: true
  strict_unknown_capabilities: true
  model_metadata:
    architecture: qwen3.6-dense
    quantization: unknown
    context_length: 262144
- engine: afm
  model: mlx-community/Qwen3.6-27B
  suite: agent-fanout
  concurrency: 1
  raw_traces: redacted
  no_raw_traces: true
  strict_unknown_capabilities: true
  model_metadata: &qwen_metadata
    architecture: qwen3.6-dense
    chat_template: qwen
- engine: afm
  model: mlx-community/Qwen3.6-27B
  suite: agent-fanout
  concurrency: 4
  raw_traces: redacted
  no_raw_traces: true
  strict_unknown_capabilities: true
  model_metadata: *qwen_metadata
- engine: afm
  model: mlx-community/Qwen3.6-27B
  suite: prefill
  concurrency: 1
  raw_traces: redacted
  no_raw_traces: true
  strict_unknown_capabilities: true
  model_metadata: *qwen_metadata
- engine: afm
  model: mlx-community/Qwen3.6-27B
  suite: prefill
  concurrency: 4
  raw_traces: redacted
  no_raw_traces: true
  strict_unknown_capabilities: true
  model_metadata: *qwen_metadata
- engine: afm
