name: smoke-example
description: Example one-case OpenAI/Anthropic-compatible smoke suite.
cases:
  - id: protocol-smoke-chat
    title: Chat completion returns expected text
    prompt: "Reply with exactly: agentblaster-ok"
    expected_substring: agentblaster-ok
    max_tokens: 16
    temperature: 0
    tags:
      - protocol
      - chat
  - id: protocol-smoke-streaming-chat
    title: Streaming chat completion returns expected text
    prompt: "Stream a reply with exactly: agentblaster-ok"
    expected_substring: agentblaster-ok
    streaming: true
    max_tokens: 16
    temperature: 0
    tags:
      - protocol
      - streaming
      - chat
