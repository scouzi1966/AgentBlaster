name: toolcall-example
description: Example tool-call suite.
cases:
  - id: toolcall-required-ping
    title: Required ping tool call
    prompt: Use the ping_agentblaster tool with target set to agentblaster-ok.
    expected_tool_name: ping_agentblaster
    tools:
      - type: function
        function:
          name: ping_agentblaster
          description: Ping the AgentBlaster benchmark harness.
          parameters:
            type: object
            properties:
              target:
                type: string
                description: Ping target.
            required:
              - target
            additionalProperties: false
    tool_choice:
      type: function
      function:
        name: ping_agentblaster
    max_tokens: 64
    temperature: 0
    tags:
      - toolcall
      - required
